name: Tests

permissions:
  contents: read
  issues: none
  pull-requests: none

on:
  pull_request:
  workflow_dispatch:

jobs:
  build_packages:
    name: Build packages
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Detect WiX v3
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin\candle.exe",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin\candle.exe"
          )

          $wixExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $wixExe) {
            throw "WiX candle.exe not found on runner"
          }

          $wixBin = Split-Path $wixExe -Parent

          "WIX=$wixExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WIX_BIN=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify WiX
        shell: pwsh
        run: |
          & "${{ env.WIX }}" -?
          light.exe -?

      - name: Create dummy changelog file
        working-directory: ./ReleaseBuilder
        shell: pwsh
        run: Set-Content -Path ./changelog-news.txt -Value "## Changed"

      - name: Build releases
        working-direc
